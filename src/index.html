<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Value Simulator</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e15; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; cursor: default; }
    canvas.hovering { cursor: pointer; }
    canvas.grabbing { cursor: grabbing; }

    #hud-top {
      position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
      display: flex; justify-content: center; padding: 0.8rem 1.5rem;
      color: #c0c0d0; font-size: 14px; z-index: 10;
    }

    #hud-bottom {
      position: fixed; bottom: 0; left: 0; width: 100%; pointer-events: none;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 1.5rem; z-index: 10;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
    }
    #money-display {
      color: #f0c040; font-weight: 900; font-size: 22px;
      text-shadow: 0 0 12px rgba(240,192,64,0.5);
      letter-spacing: 0.03em;
      display: inline-block;
    }
    #money-display .coin-icon { display: inline-block; margin-right: 6px; }
    @keyframes coin-bounce {
      0%   { transform: scale(1.35); color: #ffe566; text-shadow: 0 0 18px rgba(255,229,102,0.8); }
      50%  { transform: scale(0.95); }
      100% { transform: scale(1); color: #f0c040; text-shadow: 0 0 12px rgba(240,192,64,0.5); }
    }
    #money-display.bouncing {
      animation: coin-bounce 0.3s ease-out;
    }

    #hint {
      position: fixed; top: 4rem; left: 50%; transform: translateX(-50%);
      color: #556; font-size: 13px; letter-spacing: 0.05em;
      pointer-events: none; transition: opacity 0.5s;
    }

    #grade-popup {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 3.5rem; font-weight: 900; letter-spacing: 0.08em;
      pointer-events: none; opacity: 0; transition: opacity 0.4s;
      text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      text-align: center;
    }

    #ui {
      position: fixed; bottom: 3.5rem; left: 50%; transform: translateX(-50%);
      z-index: 10;
    }
    #ui button {
      background: #f0c040; color: #1a0f00; border: none; border-radius: 8px;
      padding: 0.65rem 2rem; font: bold 15px system-ui; cursor: pointer;
      letter-spacing: 0.05em; transition: background 0.15s, transform 0.1s;
      pointer-events: auto;
    }
    #ui button:hover { background: #ffe060; transform: scale(1.05); }
    #ui button:active { transform: scale(0.97); }

    #btn-swap {
      background: none; border: none; cursor: pointer; pointer-events: auto;
      color: #f0c040; font-weight: 900; font-size: 22px;
      text-shadow: 0 0 12px rgba(240,192,64,0.5);
      letter-spacing: 0.03em;
      transition: transform 0.1s, opacity 0.3s;
    }
    #btn-swap:hover:not(:disabled) { transform: scale(1.1); }
    #btn-swap:active:not(:disabled) { transform: scale(0.95); }
    #btn-swap:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-swap .cooldown { font-size: 14px; opacity: 0.7; }

    #loading {
      position: fixed; inset: 0; background: #0a0e15;
      display: flex; align-items: center; justify-content: center;
      color: #f0c040; font-size: 1.2rem; z-index: 100;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div id="loading">로딩 중...</div>

  <div id="hud-top">Box Value Simulator</div>
  <div id="hud-bottom">
    <button id="btn-swap">🔄 교환</button>
    <div id="money-display"><span class="coin-icon">🪙</span>₩ 100,000</div>
  </div>

  <div id="hint">상자를 클릭해서 선택하세요</div>
  <div id="grade-popup"></div>
  <div id="ui">
    <button id="btn-action" style="display:none">개봉하기</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
